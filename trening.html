<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twój Plan Treningowy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2980b9;
            --accent: #f39c12;
            --bg: #f0f3f5;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Pasek postępu */
        .progress-container {
            margin-bottom: 25px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #2ecc71);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Zawartość ćwiczenia */
        .exercise-image {
            width: 100%;
            height: 250px;
            background: #f9f9f9;
            border-radius: 15px;
            object-fit: contain;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        h2 {
            font-size: 1.6rem;
            margin: 0 0 10px 0;
            color: var(--secondary);
        }

        .reps-box {
            display: inline-block;
            background: #fef5e7;
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .instruction {
            line-height: 1.6;
            color: #5d6d7e;
            margin-bottom: 30px;
            min-height: 60px;
        }

        /* Przyciski */
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        button:hover {
            background: #219150;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Ekran końcowy */
        #finish-screen {
            display: none;
            padding: 20px 0;
        }

        #finish-screen h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="exercise-screen">
        <div class="progress-container">
            <div class="progress-info">
                <span>Postęp</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="content">
            <img id="ex-img" class="exercise-image" src="" alt="Ilustracja ćwiczenia">
            <h2 id="ex-title">Ładowanie...</h2>
            <div class="reps-box" id="ex-reps">-</div>
            <p class="instruction" id="ex-desc">-</p>
            <button onclick="handleNext()">ZROBIONE! ✓</button>
            <p style="color: #bdc3c7; font-size: 0.8rem; margin-top: 15px;" id="ex-counter">Ćwiczenie 1 z 25</p>
        </div>
    </div>

    <div id="finish-screen">
        <div style="font-size: 5rem; margin-bottom: 20px;">🎉</div>
        <h1>GRATULACJE!</h1>
        <p style="font-size: 1.2rem; color: #7f8c8d;">Właśnie zadbałeś o swoje zdrowie!</p>
        <p>Twoje ciało Ci za to podziękuje.</p>
        <button onclick="location.reload()" style="background: var(--secondary); margin-top: 30px;">Zacznij od nowa</button>
    </div>
</div>

<script>
    const exercises = [
        { "title": "Kółeczka stopami", "reps": "10x na zewnątrz i 10x do wewnątrz", "desc": "Pw. leżenie tyłem, kółeczka stopami.", "img": "https://via.placeholder.com/400x250?text=Kółeczka+stopami" },
        { "title": "Zginanie stóp", "reps": "10x", "desc": "Pw. leżenie tyłem, zginanie grzbietowe i podeszwowe stóp.", "img": "https://via.placeholder.com/400x250?text=Zginanie+stóp" },
        { "title": "Skręcanie stóp", "reps": "10-15x", "desc": "Pw. leżenie tyłem, nogi rozszerzone 50-60 cm, skręcanie stóp do środka i na zewnątrz.", "img": "https://via.placeholder.com/400x250?text=Skręcanie+stóp" },
        { "title": "Naprzemienne zginanie nóg", "reps": "10x", "desc": "Pw. leżenie tyłem, naprzemienne zginanie kończyn dolnych w stawach biodrowych i kolanowych, suwając piętą po materacu.", "img": "https://via.placeholder.com/400x250?text=Naprzemienne+zginanie+nóg" },
        { "title": "Ćwiczenie oddechowe", "reps": "3-4x", "desc": "Pw. leżenie tyłem, ręce splecione na brzuchu, przenosimy ręce za głowę z jednoczesnym wdechem nosem, powrót do pozycji wyjściowej - wydech ustami.", "img": "https://via.placeholder.com/400x250?text=Ćwiczenie+oddechowe" },
        { "title": "Odwodzenie nóg", "reps": "Po 10x na każdą nogę", "desc": "Pw. leżenie tyłem, odwodzenie i przywodzenie naprzemienne nóg w bok.", "img": "https://via.placeholder.com/400x250?text=Odwodzenie+nóg" },
        { "title": "Rozrywanie rąk", "reps": "10x", "desc": "Pw. leżenie tyłem, ręce „haczyki” splecione przed klatką piersiową, próba rozrywania rąk (wytrzymać 5 sekund).", "img": "https://via.placeholder.com/400x250?text=Rozrywanie+rąk" },
        { "title": "Rozchylanie kolan", "reps": "10-15x", "desc": "Pw. leżenie tyłem, nogi zgięte, stopy oparte o podłoże, ręce na karku. Rozchylanie kolan na zewnątrz do granicy bólu, a następnie łączenie.", "img": "https://via.placeholder.com/400x250?text=Rozchylanie+kolan" },
        { "title": "Unoszenie głowy", "reps": "10x", "desc": "Pw. leżenie tyłem, nogi zgięte, stopy oparte. Unoszenie głowy z dotknięciem brodą do klatki piersiowej, wytrzymać 3 sekundy.", "img": "https://via.placeholder.com/400x250?text=Unoszenie+głowy" },
        { "title": "Unoszenie bioder", "reps": "10x", "desc": "Pw. leżenie tyłem, nogi zgięte, stopy oparte, ręce wzdłuż tułowia. Unoszenie bioder (mostek), wytrzymać 3 sekundy.", "img": "https://via.placeholder.com/400x250?text=Unoszenie+bioder" },
        { "title": "Dotykanie kolanami podłoża", "reps": "Wykonaj starannie", "desc": "Pw. leżenie tyłem, nogi odwiedzione, zgięte w biodrach i kolanach. Naprzemienne dotykanie kolanami podłoża do wewnątrz (między nogami).", "img": "https://via.placeholder.com/400x250?text=Dotykanie+kolanami" },
        { "title": "Wciskanie łokci", "reps": "3-4x", "desc": "Pw. leżenie tyłem, ręce na karku. Rozchylanie łokci z wciskaniem ich w podłoże (wdech), łączenie łokci przed sobą (wydech).", "img": "https://via.placeholder.com/400x250?text=Wciskanie+łokci" },
        { "title": "Prostowanie kolan do podłoża", "reps": "10x", "desc": "Pw. leżenie tyłem, mocne prostowanie kolan z próbą wciśnięcia ich w podłoże, przytrzymać 5 sekund.", "img": "https://via.placeholder.com/400x250?text=Prostowanie+kolan" },
        { "title": "Prostowanie kolan na wałku", "reps": "10x", "desc": "Pw. leżenie tyłem, wałek pod kolanami, prostowanie nóg w stawach kolanowych, wytrzymać 5 sekund.", "img": "https://via.placeholder.com/400x250?text=Prostowanie+na+wałku" },
        { "title": "Naciskanie dłoni", "reps": "5-10x", "desc": "Pw. leżenie tyłem, ręce złożone jak do modlitwy przed klatką, łokcie na zewnątrz. Mocne naciskanie dłoni na dłoń, wytrzymać 5 sekund.", "img": "https://via.placeholder.com/400x250?text=Naciskanie+dłoni" },
        { "title": "Głęboki oddech", "reps": "3-4x", "desc": "Pw. leżenie tyłem, spokojny wdech nosem i długi wydech ustami.", "img": "https://via.placeholder.com/400x250?text=Oddech" },
        { "title": "Zginanie kolan przodem", "reps": "Po 10x na każdą nogę", "desc": "Pw. leżenie przodem (na brzuchu), ręce pod brodą, naprzemienne zginanie nóg w kolanach.", "img": "https://via.placeholder.com/400x250?text=Zginanie+kolan+przodem" },
        { "title": "Wspięcie na palce w leżeniu", "reps": "Po 10x na każdą nogę", "desc": "Pw. leżenie przodem, wspięcie jednej nogi na palce z jednoczesnym jej prostowaniem w kolanie.", "img": "https://via.placeholder.com/400x250?text=Wspiecie+w+leżeniu" },
        { "title": "Napinanie pośladków", "reps": "10x", "desc": "Pw. leżenie przodem, ręce pod brodą, mocne napinanie mięśni pośladków, wytrzymać 3 sekundy.", "img": "https://via.placeholder.com/400x250?text=Napinanie+pośladków" },
        { "title": "Ściąganie łopatek", "reps": "10x", "desc": "Pw. leżenie przodem, głowa oparta brodą, ręce zgięte pod kątem 90°. Oderwanie rąk od materaca z jednoczesnym ściąganiem łopatek.", "img": "https://via.placeholder.com/400x250?text=Ściąganie+łopatek" },
        { "title": "Unoszenie naprzemienne kończyn", "reps": "Po 10x na każdą stronę", "desc": "Pw. leżenie przodem, ręce wyprostowane przed sobą. Unoszenie lewej ręki i prawej nogi o około 10°, następnie zmiana.", "img": "https://via.placeholder.com/400x250?text=Unoszenie+naprzemienne" },
        { "title": "Wspinanie na palce i pięty", "reps": "10x", "desc": "Pozycja stojąca. Naprzemienne wspinanie się na palce i przechodzenie na pięty.", "img": "https://via.placeholder.com/400x250?text=Palce-pięty" },
        { "title": "Zginanie bioder i kolan stojąc", "reps": "Po 10x na każdą nogę", "desc": "Pozycja stojąca. Naprzemienne znoszenie nogi w biodrze i kolanie do kąta 90° z jednoczesnym wspięciem na palce nogi postawnej.", "img": "https://via.placeholder.com/400x250?text=Zginanie+stojąc" },
        { "title": "Przysiady", "reps": "10x", "desc": "Pozycja stojąca. Klasyczne, spokojne przysiady. Trzymaj proste plecy.", "img": "https://via.placeholder.com/400x250?text=Przysiady" },
        { "title": "Oddech w pozycji stojącej", "reps": "3-4x", "desc": "Pozycja stojąca. Uniesienie rąk do góry (wdech nosem), opuszczenie rąk (wydech ustami).", "img": "https://via.placeholder.com/400x250?text=Oddech+stojąc" }
    ];

    let currentIndex = 0;

    function updateUI() {
        const ex = exercises[currentIndex];
        const total = exercises.length;
        const progressPercent = Math.round((currentIndex / total) * 100);

        // Teksty
        document.getElementById('ex-title').innerText = ex.title;
        document.getElementById('ex-reps').innerText = "Powtórzenia: " + ex.reps;
        document.getElementById('ex-desc').innerText = ex.desc;
        document.getElementById('ex-counter').innerText = `Ćwiczenie ${currentIndex + 1} z ${total}`;
        
        // Obrazek
        document.getElementById('ex-img').src = ex.img;
        document.getElementById('ex-img').alt = "Instrukcja: " + ex.title;

        // Pasek postępu
        document.getElementById('progress-fill').style.width = progressPercent + "%";
        document.getElementById('progress-text').innerText = progressPercent + "%";
    }

    function handleNext() {
        currentIndex++;
        
        if (currentIndex < exercises.length) {
            updateUI();
        } else {
            finishWorkout();
        }
    }

    function finishWorkout() {
        document.getElementById('exercise-screen').classList.add('hidden');
        document.getElementById('progress-fill').style.width = "100%";
        document.getElementById('progress-text').innerText = "100%";
        
        const finishScreen = document.getElementById('finish-screen');
        finishScreen.style.display = 'block';
        
        // Efekt konfetti
        const duration = 3 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#27ae60', '#2980b9', '#f1c40f']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#27ae60', '#2980b9', '#f1c40f']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }

    // Start aplikacji
    updateUI();
</script>

</body>
</html>
