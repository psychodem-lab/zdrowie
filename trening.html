        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #app-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .exercise-image {
            width: 100%;
            height: 200px;
            background: #eee;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: #888;
            object-fit: cover;
        }

        h2 { margin: 0.5rem 0; color: var(--secondary); }
        .reps { font-size: 1.2rem; font-weight: bold; color: #e67e22; }
        .desc { margin: 1rem 0; line-height: 1.5; color: #666; }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
        }

        button:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        button:active { transform: scale(0.98); }

        #finish-screen { display: none; }
        #finish-screen h1 { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>

    let currentIndex = 0;

    function updateUI() {
        const ex = exercises[currentIndex];
        const progress = ((currentIndex) / exercises.length) * 100;
        
        document.getElementById('progress-fill').style.width = progress + "%";
        document.getElementById('exercise-count').innerText = `Ćwiczenie ${currentIndex + 1} z ${exercises.length}`;
        document.getElementById('ex-title').innerText = ex.title;
        document.getElementById('ex-reps').innerText = ex.reps;
        document.getElementById('ex-desc').innerText = ex.desc;
        document.getElementById('ex-img').src = ex.img;
    }

    function nextExercise() {
        currentIndex++;
        
        if (currentIndex < exercises.length) {
            updateUI();
        } else {
            showFinish();
        }
    }

    function showFinish() {
        document.getElementById('exercise-screen').classList.add('hidden');
        document.getElementById('progress-fill').style.width = "100%";
        const finishScreen = document.getElementById('finish-screen');
        finishScreen.style.display = 'block';
        
        // Strzał z konfetti!
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 }
        });
    }

    // Inicjalizacja pierwszego ćwiczenia
    updateUI();
